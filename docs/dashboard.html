<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управління - CyberSimulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">CyberSimulator</div>
    </nav>

    <div class="container">
        <h1>Панель управління</h1>
        
        <div class="dashboard-grid">
            <div class="card">
                <h2>📚 Теорія</h2>
                <p>Вивчіть основи кібербезпеки</p>
                <a href="theory.html" class="btn">Перейти</a>
            </div>
            
            <div class="card">
                <h2>✏️ Тестування</h2>
                <p>Перевірте свої знання</p>
                <a href="quiz.html" class="btn">Перейти</a>
            </div>
            
            <div class="card">
                <h2>🎯 Практика</h2>
                <p>Практичні завдання</p>
                <a href="practice.html" class="btn">Перейти</a>
            </div>
        </div>

        <div class="stats-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Статистика</h2>
                <button onclick="clearStats()" class="btn btn-small" style="background-color: #dc3545;">Очистити статистику</button>
            </div>
            <div id="user-stats"></div>
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; background-color: #ffffff; border-top: 2px solid #293672; color: #333; font-size: 14px;">
        <p style="margin: 0;">Розробник: <a href="https://sargeras197.github.io/contacts/" target="_blank" style="color: #293672; text-decoration: underline; font-weight: bold;">Сергій Євдокимов</a> | v. 1.0</p>
    </footer>

    <script src="js/dashboard.js"></script>
</body>
</html>
