<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика - CyberSimulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">CyberSimulator</div>
        <div class="nav-user">
            <a href="dashboard.html" style="color: #293672; text-decoration: none;">← Назад до панелі</a>
        </div>
    </nav>

    <div class="container">
        <h1>Практичні завдання</h1>
        
        <div class="practice-section">
            <div class="test-card">
                <h3>Оберіть блок практики</h3>
                <p>Спочатку оберіть один із блоків, після цього відкриються відповідні вправи.</p>
                <div id="practice-block-list" class="topic-list"></div>
            </div>

            <div class="test-card" id="practice-workspace" style="display: none;">
                <h3 id="practice-workspace-title"></h3>
                <p id="practice-workspace-description"></p>

                <div id="block-password" style="display: none;">
                    <input type="password" id="password-test" placeholder="Введіть пароль для перевірки" style="width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px;">
                    <button onclick="checkPassword()" class="btn">Перевірити</button>
                    <div id="password-result" style="margin-top: 15px;"></div>
                </div>

                <div id="block-phishing" style="display: none;">
                    <div id="phishing-examples"></div>
                    <button onclick="checkPhishingAnswers()" class="btn">Перевірити відповіді</button>
                    <div id="phishing-result" style="margin-top: 15px;"></div>
                </div>

                <div id="block-practices" style="display: none;">
                    <div style="text-align: left;">
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="correct"> Використання унікальних паролів для кожного сервісу
                        </label>
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="wrong"> Зберігання паролів у текстовому файлі на робочому столі
                        </label>
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="correct"> Увімкнення двофакторної автентифікації
                        </label>
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="wrong"> Відкривання вкладень з незнайомих електронних адрес
                        </label>
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="correct"> Регулярне оновлення програмного забезпечення
                        </label>
                        <label style="display: block; margin: 10px 0; cursor: pointer;">
                            <input type="checkbox" name="practice" value="wrong"> Використання одного пароля для всіх акаунтів
                        </label>
                    </div>
                    <button onclick="checkPractices()" class="btn">Перевірити</button>
                    <div id="practices-result" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; background-color: #ffffff; border-top: 2px solid #293672; color: #333; font-size: 14px;">
        <p style="margin: 0;">Розробник: <a href="https://sargeras197.github.io/contacts/" target="_blank" style="color: #293672; text-decoration: underline; font-weight: bold;">Сергій Євдокимов</a> | v. 1.0</p>
    </footer>

    <script src="js/practice.js"></script>
</body>
</html>
